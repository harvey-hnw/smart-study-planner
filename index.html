<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Study Planner | UNSW Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>Smart Study Planner</h1>
      <div class="header-actions">
        <button id="downloadCsv" class="btn-secondary">Export CSV</button>
        <button id="clearAllBtn" class="btn-danger">Clear All</button>
      </div>
    </header>

    <div class="layout-grid">
      <aside class="controls">
        <section class="card">
          <h2>Add New Class</h2>
          <div class="form-group">
            <input type="text" id="courseName" placeholder="e.g., COMP2521" autocomplete="off">
            <select id="courseDay">
              <option value="Mon">Monday</option>
              <option value="Tue">Tuesday</option>
              <option value="Wed">Wednesday</option>
              <option value="Thu">Thursday</option>
              <option value="Fri">Friday</option>
            </select>
            <div class="time-inputs">
              <label>Start <input type="time" id="startTime" value="09:00"></label>
              <label>End <input type="time" id="endTime" value="11:00"></label>
            </div>
            <button id="addCourseBtn" class="btn-primary">Add to Schedule</button>
          </div>
        </section>

        <section class="card">
          <h2>Current Courses</h2>
          <ul id="courseList" class="course-list"></ul>
        </section>
      </aside>

      <section class="calendar-view card">
        <div id="weeklyGrid" class="weekly-grid"></div>
      </section>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
