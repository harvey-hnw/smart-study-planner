<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">
    <h1>Smart Study Planner</h1>

    <section class="card">
      <h2>Add Course</h2>
      <div class="add-grid">
        <input type="text" id="courseName" placeholder="Course Name" autocomplete="off">

        <select id="courseDay">
          <option value="Mon">Mon</option>
          <option value="Tue">Tue</option>
          <option value="Wed">Wed</option>
          <option value="Thu">Thu</option>
          <option value="Fri">Fri</option>
          <option value="Sat">Sat</option>
          <option value="Sun">Sun</option>
        </select>

        <label class="time-field">
          <span>Start</span>
          <input type="time" id="startTime">
        </label>

        <label class="time-field">
          <span>End</span>
          <input type="time" id="endTime">
        </label>

        <button type="button" id="addCourseBtn">Add Course</button>
      </div>
      <p class="hint">Tip: clashes are highlighted automatically when times overlap on the same day.</p>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Courses</h2>
        <button type="button" id="clearAllBtn" class="ghost">Clear All</button>
      </div>
      <ul id="courseList"></ul>
    </section>

    <section class="card">
      <h2>Weekly View</h2>
      <div id="weeklyGrid" class="weekly-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
